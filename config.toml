baseURL = 'https://ape902.github.io/laoguo.github.io/'
languageCode = 'zh-cn'
title = '老郭的技术笔记'
theme = 'PaperMod'
ignoreErrors = ["error-output-taxonomy", "error-remote-getcsv", "error-missing-instagram-accesstoken"]

[params]
  # 基本信息
  author = '老郭 & 千吉'
  description = 'AI 助手实践、自动化运维、技术分享 - 专注 AI 应用开发、博客自动化、OpenClaw 实战、SkillHub 技能开发'
  keywords = ['AI', '自动化', '运维', '技术博客', 'AI 应用开发', '博客自动化', 'OpenClaw', 'SkillHub', '百度文心一言', '智能搜索', 'RAG', 'Python', 'Node.js']
  
  # SEO 优化
  enableRobotsTXT = true
  verifyGoogle = ''  # Google Search Console 验证代码（可选）
  verifyBing = ''    # Bing Webmaster 验证代码（可选）
  verifyBaidu = ''   # 百度搜索资源平台验证代码（可选）
  
  # 访问统计（Google Analytics 4）
  # GA4 Measurement ID: G-XXXXXXXXXX（请替换为实际 ID）
  # 获取方式：https://analytics.google.com/ → 创建资源 → 数据流 → 获取 Measurement ID
  
  # 主题配置
  defaultTheme = 'auto'
  ShowShareButtons = true
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowAllPagesInArchive = true
  
  # 增强显示
  ShowToc = true
  TocOpen = true
  UseHugoToc = true
  
  # 自定义 CSS
  customCSS = ['css/extended.css']
  
  # 社交链接
  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/ape902'
  
  # 首页配置
  [params.homeInfoParams]
    Title = '老郭的技术笔记 🚀'
    Content = '''记录 AI 助手实践、自动化运维经验和技术探索。

**特色内容**：
- 🔥 技术热点自动追踪
- 🤖 AI 助手实践日记
- 🛡️ 安全加固实战
- 📚 技术教程与资源

由老郭和 AI 助手千吉共同维护。'''

# 菜单配置
[[menu.main]]
  name = '首页'
  url = '/'
  weight = 1

[[menu.main]]
  name = '文章'
  url = '/posts/'
  weight = 2

[[menu.main]]
  name = '标签'
  url = '/tags/'
  weight = 3

# Markdown 配置
[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    style = 'monokai'
  
  [markup.goldmark.renderer]
    unsafe = true
  
# 输出配置
[outputs]
  home = ['HTML', 'RSS']
  section = ['HTML', 'RSS']
  taxonomy = ['HTML', 'RSS']

# 隐私配置
[privacy]
  [privacy.twitter]
    disable = false
    enableDNT = true
  [privacy.youtube]
    disable = false
    privacyEnhanced = true

# Google Analytics 4 配置
[services]
  [services.googleAnalytics]
    # 请替换为你的 GA4 Measurement ID（格式：G-XXXXXXXXXX）
    # 获取方式：https://analytics.google.com/ → 创建资源 → 数据流 → 获取 Measurement ID
    ID = 'G-XXXXXXXXXX'

# 搜索引擎优化
[sitemap]
  changefreq = 'daily'
  filename = 'sitemap.xml'
  priority = 0.5
