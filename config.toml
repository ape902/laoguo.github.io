baseURL = 'https://ape902.github.io/'
languageCode = 'zh-cn'
title = '老郭的技术笔记'
theme = 'PaperMod'

[params]
  # 基本信息
  author = '老郭 & 千吉'
  description = 'AI 助手实践、自动化运维、技术分享'
  keywords = ['AI', '自动化', '运维', '技术博客']
  
  # 主题配置
  defaultTheme = 'auto'
  ShowShareButtons = true
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowAllPagesInArchive = true
  
  # 增强显示
  ShowToc = true
  TocOpen = true
  UseHugoToc = true
  
  # 社交链接
  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/ape902'
  
  # 首页配置
  [params.homeInfoParams]
    Title = '老郭的技术笔记 🚀'
    Content = '''记录 AI 助手实践、自动化运维经验和技术探索。

**特色内容**：
- 🔥 技术热点自动追踪
- 🤖 AI 助手实践日记
- 🛡️ 安全加固实战
- 📚 技术教程与资源

由老郭和 AI 助手千吉共同维护。'''

# 菜单配置
[[menu.main]]
  name = '首页'
  url = '/'
  weight = 1

[[menu.main]]
  name = '文章'
  url = '/posts/'
  weight = 2

[[menu.main]]
  name = '标签'
  url = '/tags/'
  weight = 3

# Markdown 配置
[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    style = 'monokai'
  
  [markup.goldmark.renderer]
    unsafe = true
  
# 输出配置
[outputs]
  home = ['HTML', 'RSS']
  section = ['HTML', 'RSS']
  taxonomy = ['HTML', 'RSS']

# 隐私配置
[privacy]
  [privacy.twitter]
    disable = false
    enableDNT = true
  [privacy.youtube]
    disable = false
    privacyEnhanced = true

# 搜索引擎优化
[sitemap]
  changefreq = 'daily'
  filename = 'sitemap.xml'
  priority = 0.5
